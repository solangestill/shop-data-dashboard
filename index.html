<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>店铺数据展示</title>
<style>
:root{
  --bg:#f5f7fb;--panel:#fff;--panel-soft:#f9fbff;--text:#162033;--muted:#667085;
  --line:#d9e2ef;--brand:#2563eb;--brand-soft:#e8f0ff;--green:#0f9f6e;
  --green-soft:#e7f8f1;--orange:#c77803;--orange-soft:#fff5df;--shadow:0 14px 34px rgba(16,24,40,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:var(--bg);color:var(--text)}
a{color:inherit}
.wrap{max-width:1240px;margin:0 auto;padding:28px 18px 52px}
.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}
.hero h1{font-size:30px;line-height:1.15;margin:0 0 8px}
.hero p{margin:0;color:var(--muted);font-size:14px}
.stats{display:grid;grid-template-columns:repeat(3,minmax(96px,1fr));gap:10px;min-width:330px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;box-shadow:0 4px 14px rgba(16,24,40,.04)}
.stat b{display:block;font-size:22px;color:var(--brand);margin-bottom:3px}.stat span{font-size:12px;color:var(--muted)}
.latest-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin:18px 0}
.shop-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.shop-head{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:18px 18px 12px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#f9fbff)}
.shop-head h2{margin:0;font-size:22px}.shop-head small{color:var(--muted)}
.quick-links{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;padding:16px}
.quick{display:flex;flex-direction:column;gap:6px;min-height:106px;text-decoration:none;border:1px solid var(--line);border-radius:10px;background:#fff;padding:13px;transition:.16s ease}
.quick:hover{border-color:var(--brand);box-shadow:0 8px 18px rgba(37,99,235,.12);transform:translateY(-1px)}
.quick .type{font-size:12px;font-weight:700;color:var(--brand)}.quick .title{font-weight:700;line-height:1.35}.quick .meta{margin-top:auto;font-size:12px;color:var(--muted)}
.quick.service .type{color:var(--orange)}.quick.weekly .type{color:var(--green)}
.toolbar{position:sticky;top:0;z-index:2;display:grid;grid-template-columns:1fr 150px 150px;gap:10px;margin:20px 0;padding:12px;background:rgba(245,247,251,.92);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:12px}
.toolbar input,.toolbar select{width:100%;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--text);padding:10px 11px;font-size:14px}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:24px 0 12px}
.section-title h2{font-size:20px;margin:0}.section-title span{font-size:13px;color:var(--muted)}
.account{margin-top:18px}.account h3{font-size:18px;margin:0 0 12px}
.month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.month-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 8px 24px rgba(16,24,40,.05);overflow:hidden}
.month-title{display:flex;justify-content:space-between;align-items:center;padding:14px 15px;background:var(--panel-soft);border-bottom:1px solid var(--line);font-weight:800}
.badge{font-size:12px;border-radius:999px;padding:4px 8px;background:var(--brand-soft);color:var(--brand)}
.links{display:flex;flex-direction:column;padding:8px}
.link{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;text-decoration:none;padding:10px;border-radius:9px;border:1px solid transparent}
.link:hover{background:var(--panel-soft);border-color:var(--line)}
.label{font-weight:700;line-height:1.35}.date{display:block;margin-top:3px;color:var(--muted);font-size:12px}.kind{font-size:12px;font-weight:700;white-space:nowrap;border-radius:999px;padding:4px 8px;background:var(--brand-soft);color:var(--brand)}
.kind.weekly{background:var(--green-soft);color:var(--green)}.kind.service{background:var(--orange-soft);color:var(--orange)}
.empty{background:var(--panel);border:1px dashed var(--line);border-radius:12px;color:var(--muted);padding:28px;text-align:center}
@media(max-width:880px){.hero{display:block}.stats{grid-template-columns:repeat(3,1fr);min-width:0;margin-top:14px}.latest-grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr 1fr}.toolbar input{grid-column:1/-1}}
@media(max-width:560px){.wrap{padding:22px 12px 42px}.hero h1{font-size:26px}.quick-links{grid-template-columns:1fr}.month-grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.toolbar{grid-template-columns:1fr}.link{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div>
      <h1>店铺数据展示</h1>
      <p>优先展示两个店最新数据；历史周报、月报和服务报告按月份归档。</p>
    </div>
    <div class="stats" id="stats"></div>
  </header>

  <section class="latest-grid" id="latest"></section>

  <div class="toolbar">
    <input id="q" placeholder="搜索账号、月份、周报、服务报告">
    <select id="acct"><option value="">全部账号</option></select>
    <select id="kind">
      <option value="">全部类型</option>
      <option value="weekly">周报</option>
      <option value="monthly">月报</option>
      <option value="service">服务报告</option>
    </select>
  </div>

  <div class="section-title">
    <h2>全部报告</h2>
    <span id="filterCount"></span>
  </div>
  <main id="app"></main>
</div>

<script>
const kindName={monthly:'月报',weekly:'周报',service:'服务报告',other:'其它'};
const kindOrder={weekly:1,monthly:2,service:3,other:9};
let reports=[];
function groupBy(arr,fn){return arr.reduce((m,x)=>{const k=fn(x);(m[k] ||= []).push(x);return m},{})}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function sortReports(rows){return [...rows].sort((a,b)=>(b.Sort||'').localeCompare(a.Sort||'')||(kindOrder[a.Kind]||9)-(kindOrder[b.Kind]||9)||(b.LastWrite||'').localeCompare(a.LastWrite||''))}
function latestFor(account,kind){return sortReports(reports.filter(r=>r.Account===account&&r.Kind===kind))[0]}
function linkHtml(r,extraClass=''){if(!r)return `<div class="quick ${extraClass}"><span class="type">暂无</span><span class="title">还没有对应报告</span><span class="meta">-</span></div>`;return `<a class="quick ${r.Kind} ${extraClass}" href="${encodeURI(r.Href)}" target="_blank"><span class="type">${kindName[r.Kind]||r.Kind}</span><span class="title">${esc(r.Label)}</span><span class="meta">${esc(r.Folder)} · ${esc(r.LastWrite)}</span></a>`}
function renderLatest(){
  const accounts=[...new Set(reports.map(r=>r.Account))].sort();
  document.getElementById('latest').innerHTML=accounts.map(a=>{
    const latest=sortReports(reports.filter(r=>r.Account===a))[0];
    return `<section class="shop-card"><div class="shop-head"><div><h2>${esc(a)}</h2><small>最新更新：${esc(latest?.LastWrite||'-')}</small></div></div><div class="quick-links">${linkHtml(latestFor(a,'weekly'))}${linkHtml(latestFor(a,'monthly'))}${linkHtml(latestFor(a,'service'))}</div></section>`;
  }).join('');
}
function render(){
  const q=document.getElementById('q').value.trim().toLowerCase();
  const acct=document.getElementById('acct').value;
  const kind=document.getElementById('kind').value;
  const data=sortReports(reports.filter(r=>(!acct||r.Account===acct)&&(!kind||r.Kind===kind)&&(!q||JSON.stringify(r).toLowerCase().includes(q))));
  document.getElementById('stats').innerHTML=`<div class="stat"><b>${reports.length}</b><span>总报告</span></div><div class="stat"><b>${new Set(reports.map(r=>r.Account)).size}</b><span>店铺</span></div><div class="stat"><b>${reports.filter(r=>r.Kind==='service').length}</b><span>服务报告</span></div>`;
  document.getElementById('filterCount').textContent=`当前显示 ${data.length} 份`;
  const app=document.getElementById('app');
  if(!data.length){app.innerHTML='<div class="empty">没有匹配的报告</div>';return}
  const byAcct=groupBy(data,r=>r.Account);
  app.innerHTML=Object.keys(byAcct).sort().map(a=>{
    const byMonth=groupBy(byAcct[a],r=>`${r.Year}-${r.Month}`);
    return `<section class="account"><h3>${esc(a)}</h3><div class="month-grid">${Object.keys(byMonth).sort().reverse().map(month=>{
      const rows=sortReports(byMonth[month]);
      return `<div class="month-card"><div class="month-title"><span>${esc(month)}</span><span class="badge">${rows.length}份</span></div><div class="links">${rows.map(r=>`<a class="link" href="${encodeURI(r.Href)}" target="_blank"><span><span class="label">${esc(r.Label)}</span><span class="date">${esc(r.Folder)} · ${esc(r.LastWrite)}</span></span><span class="kind ${esc(r.Kind)}">${kindName[r.Kind]||r.Kind}</span></a>`).join('')}</div></div>`;
    }).join('')}</div></section>`;
  }).join('');
}
async function init(){
  reports=await fetch('assets/reports.json',{cache:'no-store'}).then(r=>r.json());
  if(!Array.isArray(reports))reports=[reports];
  const sel=document.getElementById('acct');
  [...new Set(reports.map(r=>r.Account))].sort().forEach(a=>sel.insertAdjacentHTML('beforeend',`<option value="${esc(a)}">${esc(a)}</option>`));
  ['q','acct','kind'].forEach(id=>document.getElementById(id).addEventListener('input',render));
  renderLatest();render();
}
init().catch(e=>document.getElementById('app').innerHTML='<div class="empty">加载失败：'+esc(e.message)+'</div>');
</script>
</body>
</html>
