<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>店铺数据展示</title>
<style>
:root{--bg:#0b1020;--card:#121a2e;--muted:#8ea0c0;--text:#eef4ff;--line:#26334f;--gold:#d7a84f;--blue:#6ca8ff;--green:#4ade80}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at top,#182444,#0b1020 45%,#070b14);color:var(--text)}
.wrap{max-width:1180px;margin:0 auto;padding:32px 18px 56px}.hero{display:flex;justify-content:space-between;gap:18px;align-items:flex-end;margin-bottom:22px}.hero h1{font-size:34px;margin:0 0 8px}.hero p{margin:0;color:var(--muted)}
.stats{display:flex;gap:10px;flex-wrap:wrap}.stat{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:14px;padding:10px 14px}.stat b{color:var(--gold);font-size:20px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}.toolbar input,.toolbar select{background:#0f172a;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:11px 12px;min-width:150px}.toolbar input{flex:1;min-width:220px}.account{margin-top:22px}.account h2{font-size:24px;margin:0 0 14px;color:#fff}.year{margin:14px 0 18px}.year h3{font-size:18px;margin:0 0 12px;color:var(--gold)}.month-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}.month-card{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.035));border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.18)}.month-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:700}.badge{font-size:12px;color:#06131f;background:var(--gold);border-radius:999px;padding:3px 8px}.links{display:flex;flex-direction:column;gap:8px}.link{display:flex;justify-content:space-between;gap:12px;text-decoration:none;color:var(--text);padding:10px 11px;border:1px solid rgba(255,255,255,.08);border-radius:12px;background:rgba(0,0,0,.16)}.link:hover{border-color:var(--blue);transform:translateY(-1px)}.kind{color:var(--green);font-size:12px;white-space:nowrap}.date{color:var(--muted);font-size:12px}.empty{color:var(--muted);padding:30px;border:1px dashed var(--line);border-radius:16px}.top{position:sticky;top:0;background:rgba(11,16,32,.9);backdrop-filter:blur(10px);z-index:2;padding:10px 0}@media(max-width:640px){.hero{display:block}.hero h1{font-size:28px}.month-grid{grid-template-columns:1fr}}
</style>
</head>
<body><div class="wrap"><div class="hero"><div><h1>店铺数据展示</h1><p>按账号、年份、月份归档；月份数据和每周数据分开展示。</p></div><div class="stats" id="stats"></div></div><div class="top"><div class="toolbar"><input id="q" placeholder="搜索账号、月份、周报…"><select id="acct"><option value="">全部账号</option></select><select id="kind"><option value="">全部类型</option><option value="monthly">月报</option><option value="weekly">周报</option></select></div></div><main id="app"></main></div>
<script>
const kindName={monthly:'月报',weekly:'周报',other:'其它'};let reports=[];
function groupBy(arr,fn){return arr.reduce((m,x)=>{const k=fn(x);(m[k] ||= []).push(x);return m},{})}
function esc(s){return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function render(){const q=document.getElementById('q').value.trim().toLowerCase();const acct=document.getElementById('acct').value;const kind=document.getElementById('kind').value;let data=reports.filter(r=>(!acct||r.Account===acct)&&(!kind||r.Kind===kind)&&(!q||JSON.stringify(r).toLowerCase().includes(q)));document.getElementById('stats').innerHTML=`<div class="stat"><b>${reports.length}</b><br><span>报告</span></div><div class="stat"><b>${new Set(reports.map(r=>r.Account)).size}</b><br><span>账号</span></div><div class="stat"><b>${data.length}</b><br><span>当前筛选</span></div>`;const app=document.getElementById('app');if(!data.length){app.innerHTML='<div class="empty">没有匹配的报告</div>';return}const byAcct=groupBy(data,r=>r.Account);app.innerHTML=Object.keys(byAcct).sort().map(a=>{const byYear=groupBy(byAcct[a],r=>r.Year);return `<section class="account"><h2>${esc(a)}</h2>${Object.keys(byYear).sort().reverse().map(y=>{const byMonth=groupBy(byYear[y],r=>r.Month);return `<div class="year"><h3>${esc(y)}</h3><div class="month-grid">${Object.keys(byMonth).sort().reverse().map(m=>{const rows=byMonth[m].sort((x,y)=>y.Sort.localeCompare(x.Sort));return `<div class="month-card"><div class="month-title"><span>${esc(m)}月</span><span class="badge">${rows.length}份</span></div><div class="links">${rows.map(r=>`<a class="link" href="${encodeURI(r.Href)}" target="_blank"><span><b>${esc(r.Label)}</b><br><span class="date">${esc(r.Folder)} · ${esc(r.LastWrite)}</span></span><span class="kind">${kindName[r.Kind]||r.Kind}</span></a>`).join('')}</div></div>`}).join('')}</div></div>`}).join('')}</section>`}).join('')}
async function init(){reports=await fetch('assets/reports.json',{cache:'no-store'}).then(r=>r.json());if(!Array.isArray(reports))reports=[reports];const sel=document.getElementById('acct');[...new Set(reports.map(r=>r.Account))].sort().forEach(a=>sel.insertAdjacentHTML('beforeend',`<option value="${esc(a)}">${esc(a)}</option>`));['q','acct','kind'].forEach(id=>document.getElementById(id).addEventListener('input',render));render()}
init().catch(e=>document.getElementById('app').innerHTML='<div class="empty">加载失败：'+e.message+'</div>')
</script></body></html>
